<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Brawl Challenge</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/Brawl-Challenge/' +
        '?/' + l.pathname.slice(1).replace(/\/Brawl-Challenge\/?/, '') +
        (l.search ? '&' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
